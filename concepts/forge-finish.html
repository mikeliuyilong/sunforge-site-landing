<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SunForge · Forge → Finish</title>
<style>
  body { margin:0; font-family:'Inter',sans-serif; background:#f5f2ef; color:#1c1c1c; }
  header { padding:40px 8%; display:flex; justify-content:space-between; align-items:center; }
  header h1 { font-size:2.4rem; margin:0; font-weight:600; letter-spacing:.05em; }
  .split { display:grid; grid-template-columns: repeat(auto-fit,minmax(300px,1fr)); gap:30px; padding:0 8% 70px; }
  .panel { background:#fff; border-radius:32px; padding:32px; box-shadow:0 25px 70px rgba(0,0,0,0.08); }
  .panel img { width:100%; border-radius:26px; margin-bottom:20px; }
  .panel h2 { margin:0 0 12px; font-size:1.3rem; letter-spacing:0.2em; text-transform:uppercase; color:#a15c1a; }
  .panel p { margin:0; color:#555; }
  .menu { display:flex; gap:14px; flex-wrap:wrap; }
  .menu button { border:none; background:#0f172a; color:#fff; padding:10px 16px; border-radius:999px; font-size:.85rem; letter-spacing:0.1em; }
</style>
</head>
<body>
<header>
  <h1>Forge → Finish</h1>
  <div class="menu">
    <button>Casting</button><button>Forging</button><button>Machining</button><button>Fastener</button><button>Special</button><button>Coating</button>
  </div>
</header>
<div class="split">
  <div class="panel">
    <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=1200&q=60" alt="forge" />
    <h2>Heat & Form</h2>
    <p>Heavy presses and molds to sculpt raw metal. Our forge partners deliver repeatable strength.</p>
  </div>
  <div class="panel">
    <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?auto=format&fit=crop&w=1200&q=60" alt="casting" />
    <h2>Cast & Flow</h2>
    <p>Molten control, tooling, flow simulation, and fast switchovers for pilot runs.</p>
  </div>
  <div class="panel">
    <img src="https://images.unsplash.com/photo-1501386761578-eac5c94b800a?auto=format&fit=crop&w=1200&q=60" alt="machining" />
    <h2>Cut & Perfect</h2>
    <p>Five-axis automation cells with realtime inspection and data feeds.</p>
  </div>
</div>
</body>
</html>
